spring:
  application:
    name: pistago-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/pistago
    username: pistago_user
    password: pistago_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 9090

