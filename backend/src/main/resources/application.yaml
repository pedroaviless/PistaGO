spring:
  application:
    name: pistago-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/pistago
    username: pistago_user
    password: pistago_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 9090